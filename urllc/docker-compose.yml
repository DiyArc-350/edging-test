version: '3.8'

services:
  # Service 1: NanoDet UDP Inference Node
  nanodet-udp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urllc-nanodet-udp-backend
    ports:
      - "9998:9998/udp"  # <-- NanoDet handles Port 9998 over UDP
    volumes:
      - /dev/shm:/dev/shm
    shm_size: '512mb'
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
